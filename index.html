<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hob</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Dancing Script', cursive;
        }

        #loginOverlay {
            position: absolute;
            z-index: 10;
            text-align: center;
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid pink;
            box-shadow: 0 0 20px rgba(255, 192, 203, 0.3);
        }
        
        #loginOverlay h2 {
            color: pink; 
            font-family: sans-serif;
            margin-bottom: 20px;
        }

        #loginOverlay input {
            padding: 12px;
            border-radius: 5px;
            border: none;
            outline: none;
            font-size: 18px;
            text-align: center;
            width: 220px;
            background-color: #eee;
        }

        #loginOverlay button {
            padding: 10px 30px;
            margin-top: 20px;
            background-color: pink;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: sans-serif;
            transition: 0.3s;
        }

        #loginOverlay button:hover {
            background-color: #ffb6c1;
            transform: scale(1.05);
        }

        #topText, #bottomText, #heartCanvas {
            display: none;
        }
        
        canvas { display: block; }
        
        #topText {
            position: absolute;
            top: 8%; 
            font-size: 45px; /* صغرت الخط قليلاً لتناسب الجملة الطويلة */
            font-weight: bold;
            color: pink;
            text-shadow: 0 0 15px rgba(255, 192, 203, 0.7), 0 0 5px white;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
        }

        #bottomText {
            position: absolute;
            bottom: 8%;
            font-size: 35px;
            color: pink;
            text-shadow: 0 0 10px rgba(255, 192, 203, 0.5);
        }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h2>Enter Password</h2>
        <input type="password" id="passInput" placeholder="Password">
        <br>
        <button onclick="unlock()">Login</button>
        <p id="errMsg" style="color: #ff4d4d; font-family: sans-serif; margin-top: 15px; font-size: 14px;"></p>
    </div>

    <!-- التعديل هنا: إضافة Rahma For Ever -->
    <div id="topText">I Love You Rahma For Ever</div>
    <canvas id="heartCanvas"></canvas>
    <div id="bottomText">By Fares</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let i = 0;
        const scale = 15;

        function unlock() {
            const pass = document.getElementById('passInput').value;
            const correctPass = "17/2/2026"; 

            if (pass === correctPass) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('topText').style.display = 'block';
                document.getElementById('bottomText').style.display = 'block';
                document.getElementById('heartCanvas').style.display = 'block';
                
                resize();
                draw();
            } else {
                document.getElementById('errMsg').innerText = "Incorrect Password! Please try again.";
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);

        function heartX(t) {
            return 15 * Math.pow(Math.sin(t), 3);
        }

        function heartY(t) {
            return -(12 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        }

        function draw() {
            if (i > 300) return; 

            ctx.strokeStyle = "red"; 
            ctx.lineWidth = 1;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.beginPath();
            ctx.moveTo(centerX, centerY);

            const x = centerX + heartX(i) * scale;
            const y = centerY + heartY(i) * scale;

            ctx.lineTo(x, y);
            ctx.stroke();

            i += 0.1; 
            requestAnimationFrame(draw); 
        }
    </script>
</body>
</html>
