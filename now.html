<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Hob</title>
    <!-- استدعاء خط يدوي مزخرف من Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* تطبيق الخط المزخرف على الصفحة */
            font-family: 'Dancing Script', cursive;
        }
        canvas {
            display: block;
        }
        
        #topText {
            position: absolute;
            top: 8%; 
            font-size: 50px; /* تكبير الخط ليظهر جمال الزخرفة */
            font-weight: bold;
            color: pink;
            text-shadow: 0 0 15px rgba(255, 192, 203, 0.7), 0 0 5px white;
            letter-spacing: 1px;
        }

        #bottomText {
            position: absolute;
            bottom: 8%;
            font-size: 35px;
            color: pink;
            text-shadow: 0 0 10px rgba(255, 192, 203, 0.5);
        }
    </style>
</head>
<body>

    <div id="topText">I Love You Rahma For Ever</div>
    <canvas id="heartCanvas"></canvas>
    <div id="bottomText">By Fares</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function heartX(t) {
            return 15 * Math.pow(Math.sin(t), 3);
        }

        function heartY(t) {
            return -(12 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        }

        let i = 0;
        const scale = 15; 

        function draw() {
            if (i > 300) return; 

            ctx.strokeStyle = "red"; 
            ctx.lineWidth = 1;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.beginPath();
            ctx.moveTo(centerX, centerY);

            const x = centerX + heartX(i) * scale;
            const y = centerY + heartY(i) * scale;

            ctx.lineTo(x, y);
            ctx.stroke();

            i += 0.1; 
            requestAnimationFrame(draw); 
        }

        draw();
    </script>
</body>
</html>
